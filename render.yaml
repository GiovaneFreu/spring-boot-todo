services:
  - type: web
    runtime: docker
    name: spring-boot-todo
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        fromDatabase:
          name: spring-boot-todo-db
          property: connectionString
      - key: PGUSER
        fromDatabase:
          name: spring-boot-todo-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: spring-boot-todo-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=75.0

databases:
  - name: spring-boot-todo-db
    plan: free
    region: oregon
    databaseName: todo_db
    user: todo_user
